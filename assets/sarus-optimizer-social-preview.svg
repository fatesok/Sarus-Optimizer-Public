<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Sarus-Optimizer public preview</title>
  <desc id="desc">Public roadmap and benchmark summaries for explainable facility, transport, capacity, and ROI optimization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="58%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1120" cy="80" r="220" fill="#dbeafe" opacity="0.30"/>
  <circle cx="1040" cy="560" r="260" fill="#93c5fd" opacity="0.20"/>
  <path d="M70 510 C210 400, 300 455, 430 355 S665 255, 780 335 S990 390, 1160 250" fill="none" stroke="#bfdbfe" stroke-width="6" opacity="0.55"/>
  <g filter="url(#shadow)">
    <rect x="80" y="78" width="1120" height="484" rx="42" fill="url(#panel)"/>
  </g>
  <text x="120" y="170" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="#0f172a">Sarus-Optimizer</text>
  <text x="122" y="220" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="600" fill="#1e3a5f">Explainable facility, transport, capacity and ROI optimization</text>
  <text x="122" y="278" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">Public roadmap • Use cases • Benchmark summaries • Planning evidence</text>
  <g transform="translate(122,335)">
    <rect x="0" y="0" width="210" height="82" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <text x="26" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Location</text>
    <text x="26" y="60" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">Where should it go?</text>
    <rect x="245" y="0" width="210" height="82" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <text x="271" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Capacity</text>
    <text x="271" y="60" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">How large is feasible?</text>
    <rect x="490" y="0" width="210" height="82" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="516" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Access</text>
    <text x="516" y="60" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">Which constraints bind?</text>
    <rect x="735" y="0" width="210" height="82" rx="18" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="2"/>
    <text x="761" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Value</text>
    <text x="761" y="60" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">What is the tradeoff?</text>
  </g>
  <text x="120" y="512" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Source code remains private. Public material focuses on roadmap, methods, use cases and reviewed summaries.</text>
</svg>
