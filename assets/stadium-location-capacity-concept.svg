<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Stadium location and capacity concept</title>
  <desc id="desc">A concept diagram showing demand areas, candidate sites, transport modes, constraints, and capacity selection for stadium planning.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a5f"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="32" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="800" fill="#0f172a">Stadium Location + Capacity Planning</text>
  <text x="70" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">The planning question is not only where to build, but what capacity is feasible under access constraints.</text>

  <g transform="translate(75,155)">
    <rect x="0" y="0" width="690" height="465" rx="30" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
    <text x="32" y="45" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Regional catchment</text>
    <path d="M60 360 C120 260, 220 285, 280 200 C360 95, 470 120, 570 70" fill="none" stroke="#cbd5e1" stroke-width="18" stroke-linecap="round"/>
    <path d="M70 380 C170 360, 285 395, 405 335 C510 282, 560 235, 620 205" fill="none" stroke="#bfdbfe" stroke-width="16" stroke-linecap="round"/>
    <circle cx="300" cy="238" r="145" fill="#dbeafe" opacity="0.52"/>
    <circle cx="300" cy="238" r="95" fill="#bfdbfe" opacity="0.55"/>
    <circle cx="300" cy="238" r="40" fill="#60a5fa" opacity="0.95"/>
    <text x="255" y="245" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#ffffff">Site A</text>
    <circle cx="525" cy="330" r="85" fill="#fed7aa" opacity="0.55"/>
    <circle cx="525" cy="330" r="38" fill="#fb923c" opacity="0.95"/>
    <text x="482" y="337" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#ffffff">Site B</text>
    <line x1="160" y1="90" x2="285" y2="215" stroke="#1e3a5f" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="120" y1="405" x2="280" y2="265" stroke="#1e3a5f" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="610" y1="105" x2="335" y2="225" stroke="#1e3a5f" stroke-width="4" marker-end="url(#arrow)"/>
    <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">
      <text x="44" y="438">Demand areas feed candidate sites through different travel modes.</text>
    </g>
  </g>

  <g transform="translate(815,155)" filter="url(#shadow)">
    <rect x="0" y="0" width="315" height="465" rx="30" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="32" y="45" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Decision summary</text>
    <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
      <text x="32" y="100">1. Estimate spatial demand</text>
      <text x="32" y="145">2. Apply travel friction</text>
      <text x="32" y="190">3. Check mode capacity</text>
      <text x="32" y="235">4. Test event revenues</text>
      <text x="32" y="280">5. Compare life-cycle value</text>
    </g>
    <rect x="32" y="330" width="250" height="74" rx="18" fill="#eff6ff" stroke="#60a5fa"/>
    <text x="55" y="360" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f172a">Public output</text>
    <text x="55" y="385" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">Ranking, constraints, sensitivity</text>
  </g>
</svg>
